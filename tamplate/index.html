{% extends 'base.html' %}
{% block title%} Index {% endblock title %}
{% block content%}
<div class="page-wrap">
    <div class="hero">
        <div id="typingText" class="hero-title"></div>
        <p class="hero-subtitle">Curated thoughts, stories, and ideas from your community.</p>
    </div>

<script>
    var myString = "WELCOME, all bloggers...";
    var myArray = myString.split("");
    var loopTimer;

    function looper() {
        if (myArray.length > 0) {
            document.getElementById("typingText").innerHTML += myArray.shift();
        } else {
            clearTimeout(loopTimer);
        }
        loopTimer = setTimeout('looper()', 100);
    }
    looper();
</script>

    <div class="container filter-card card-like">
        <h2>Filter</h2>
        <form action="" id="ok" method="post">
            <select id="query" class="form-control" onchange="select()">
                <option selected></option>
                <option value="tittle">By Title</option>
                <option value="popular">Popular</option>
            </select>
        </form>
    </div>

<script>
    function select() {
        let a = document.getElementById('query');
        console.log(a.value)
        if (a.value == 'tittle') {
            window.location = "/filter/tittle";
        } else if (a.value == 'popular') {
            window.location = "/filter/-tittle";
        }
    }
</script>

    <div class="container">
        <div class="row blog-grid">
            {% for i in data %}
            <div class="col-lg-4">
                <div class="blog-card">
                    <a href="{% url 'readmore' i.id %}">
                        <img src="{{i.image.url}}" alt="img">
                    </a>
                    <div class="blog-body">
                        <h2 class="blog-title">{{i.tittle}}</h2>
                        <div class="blog-meta">Created by: {{i.created_by}}</div>
                        <a href="{% url 'readmore' i.id %}" class="btn btn-primary">Read More</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

{% endblock %}
