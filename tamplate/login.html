{% extends 'base.html' %}

{% block title%}Login Form {% endblock title %}

{% block content %}
  <div class="page-wrap">
    <form method="post">
      {% csrf_token %}
      <div class="card-like form-card">
        <h1 class="page-title">Login</h1>

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" aria-describedby="emailHelp" name="user" placeholder="Enter Username">
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" placeholder="Enter Password">
        </div>

        <a href="signup">If not an account?</a><br><br>

        <button type="submit" class="btn btn-primary">Login</button>
      </div>
    </form>

    {% for i in messages %}
    {{i}}
    {% endfor %}
  </div>
{% endblock %}
