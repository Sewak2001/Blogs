{% extends 'base.html' %}
{% block title%} Signup Form {% endblock title %}
{% block content%}
  <div class="page-wrap">
    <form method="post">
      {% csrf_token %}
      <div class="card-like form-card">
        <h1 class="page-title">Sign Up</h1>

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" aria-describedby="emailHelp" name="user" placeholder="Enter Username">
        </div>

        <div class="mb-3">
          <label class="form-label">Name</label>
          <input class="form-control" aria-describedby="emailHelp" name="name" placeholder="Enter Name">
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" aria-describedby="emailHelp" name="email" placeholder="Enter Email">
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" placeholder="Enter Password">
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" name="confirm" placeholder="Enter Confirm Password">
        </div>

        <a href="login">If already account?</a><br><br>

        <button type="submit" class="btn btn-primary">Submit</button>
      </div>
    </form>
    {% for i in messages %}
    {{i}}
    {% endfor %}
  </div>
{% endblock %}
